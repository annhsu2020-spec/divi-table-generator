<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Divi 文字模組專用防彈表格生成器</title>
  
  <!-- 載入 React 引擎 (CDN) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- 載入 Babel 編譯器 (CDN) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- 載入 Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
  
  <div id="root"></div>

  <!-- React 應用程式碼 -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    function InlineTableGenerator() {
      const defaultHtml = `<table class="compare-table">
<thead>
<tr>
<th>時間</th>
<th>議程</th>
<th>講者</th>
</tr>
</thead>
<tbody>
<tr>
<td>13:30-14:00</td>
<td>報到入場</td>
<td>-</td>
</tr>
<tr>
<td>14:00-14:15</td>
<td>暖場簡介・飛騰雲端</td>
<td>飛騰雲端業務協理<br>許正瑋 David</td>
</tr>
<tr>
<td>14:15-15:00</td>
<td>職場霸凌、性騷擾案例解析與企業合規指南 (上)</td>
<td>宇恒法律事務所所長<br>沈以軒律師</td>
</tr>
<tr>
<td>15:00-15:20</td>
<td>中場休息</td>
<td>-</td>
</tr>
<tr>
<td class="highlight-cell">15:20-15:40</td>
<td class="highlight-cell">案例分享</td>
<td class="highlight-cell"></td>
</tr>
<tr>
<td>15:40-16:40</td>
<td>職場霸凌、性騷擾案例解析與企業合規指南 (下)</td>
<td>宇恒法律事務所所長<br>沈以軒律師</td>
</tr>
</tbody>
</table>`;

      const [inputHtml, setInputHtml] = useState(defaultHtml);
      const [generatedCode, setGeneratedCode] = useState('');
      const [copied, setCopied] = useState(false);

      const [styles, setStyles] = useState({
        headerBg: '#4a658a',
        headerText: '#ffffff',
        rowOddBg: '#ffffff',
        rowEvenBg: '#eef4fa',
        borderColor: '#4a658a',
        bodyText: '#333333',
        highlightBg: '#fdf4ec',
        highlightText: '#d35400',
        textAlign: 'center',
        fontSize: '15px'
      });

      useEffect(() => {
        generateInlineCode();
      }, [inputHtml, styles]);

      const handleStyleChange = (key, value) => {
        setStyles(prev => ({ ...prev, [key]: value }));
      };

      const generateInlineCode = () => {
        try {
          const parser = new DOMParser();
          const doc = parser.parseFromString(inputHtml, 'text/html');
          const table = doc.querySelector('table');
          
          if (!table) {
            setGeneratedCode('<!-- 請貼上包含 <table> 的正確語法 -->');
            return;
          }

          table.removeAttribute('class');
          table.style.cssText = `width: 100%; min-width: 600px; border-collapse: collapse; font-family: inherit; font-size: ${styles.fontSize}; line-height: 1.6;`;

          const ths = table.querySelectorAll('th');
          ths.forEach(th => {
            th.style.cssText = `background-color: ${styles.headerBg}; color: ${styles.headerText}; padding: 16px 12px; border: 1px solid ${styles.borderColor}; text-align: center; font-weight: bold; white-space: nowrap;`;
          });

          const trs = table.querySelectorAll('tbody tr');
          trs.forEach((tr, index) => {
            const isHighlightRow = tr.classList.contains('highlight-cell');
            const defaultBg = index % 2 === 0 ? styles.rowOddBg : styles.rowEvenBg;
            
            const tds = tr.querySelectorAll('td');
            tds.forEach(td => {
              const isHighlightCell = td.classList.contains('highlight-cell') || isHighlightRow;
              const bg = isHighlightCell ? styles.highlightBg : defaultBg;
              const textColor = isHighlightCell ? styles.highlightText : styles.bodyText;
              
              td.style.cssText = `padding: 14px 12px; border: 1px solid ${styles.borderColor}; text-align: ${styles.textAlign}; vertical-align: middle; background-color: ${bg}; color: ${textColor};`;
              td.removeAttribute('class');
            });
            tr.removeAttribute('class');
          });

          const finalHtml = `
<div style="width: 100%; overflow-x: auto; margin-bottom: 20px; box-shadow: 0 0 0 1px ${styles.borderColor} inset; border-radius: 4px;">
${table.outerHTML}
</div>
          `.trim();

          setGeneratedCode(finalHtml);
        } catch (error) {
          setGeneratedCode('<!-- 語法解析錯誤，請確認貼上的 HTML 格式正確 -->');
        }
      };

      const copyToClipboard = () => {
        const textArea = document.createElement("textarea");
        textArea.value = generatedCode;
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        } catch (err) {
          console.error('複製失敗', err);
        }
        document.body.removeChild(textArea);
      };

      return (
        <div className="min-h-screen bg-gray-50 p-6 font-sans text-gray-800">
          <div className="max-w-7xl mx-auto space-y-6">
            
            {/* Header */}
            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex items-center justify-between border-l-4 border-l-green-500">
              <div>
                <h1 className="text-2xl font-bold text-gray-900 flex items-center gap-2">
                  <svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" className="text-green-600"><polyline points="4 7 4 4 20 4 20 7"></polyline><line x1="9" y1="20" x2="15" y2="20"></line><line x1="12" y1="4" x2="12" y2="20"></line></svg>
                  Divi 「文字模組」專用防彈表格生成器
                </h1>
                <p className="text-gray-500 mt-1 text-sm">
                  強制將所有樣式轉換為 Inline-Style (內聯樣式)。行銷人員只需將產出的代碼貼到 Divi 文字模組的「文字(Text)」分頁即可。
                </p>
              </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
              
              {/* 左側：設定區 */}
              <div className="lg:col-span-4 space-y-6">
                <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                  <h2 className="text-lg font-semibold mb-3 flex items-center gap-2">
                    <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" className="text-gray-500"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                    1. 貼上原始 Table 語法
                  </h2>
                  <textarea
                    className="w-full h-48 p-3 text-sm font-mono border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none"
                    value={inputHtml}
                    onChange={(e) => setInputHtml(e.target.value)}
                  />
                </div>

                <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                  <h2 className="text-lg font-semibold mb-4 flex items-center gap-2">
                    <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" className="text-gray-500"><circle cx="13.5" cy="6.5" r=".5"></circle><circle cx="17.5" cy="10.5" r=".5"></circle><circle cx="8.5" cy="7.5" r=".5"></circle><circle cx="6.5" cy="12.5" r=".5"></circle><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"></path></svg>
                    2. 快速樣式調校
                  </h2>
                  <div className="space-y-4">
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block text-xs font-medium text-gray-700 mb-1">抬頭背景色</label>
                        <div className="flex h-10 border border-gray-300 rounded-lg overflow-hidden">
                          <input type="color" value={styles.headerBg} onChange={(e) => handleStyleChange('headerBg', e.target.value)} className="w-12 h-full p-0 border-0 cursor-pointer" />
                          <input type="text" value={styles.headerBg} onChange={(e) => handleStyleChange('headerBg', e.target.value)} className="flex-1 px-2 text-sm uppercase outline-none" />
                        </div>
                      </div>
                      <div>
                        <label className="block text-xs font-medium text-gray-700 mb-1">抬頭文字色</label>
                        <div className="flex h-10 border border-gray-300 rounded-lg overflow-hidden">
                          <input type="color" value={styles.headerText} onChange={(e) => handleStyleChange('headerText', e.target.value)} className="w-12 h-full p-0 border-0 cursor-pointer" />
                          <input type="text" value={styles.headerText} onChange={(e) => handleStyleChange('headerText', e.target.value)} className="flex-1 px-2 text-sm uppercase outline-none" />
                        </div>
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block text-xs font-medium text-gray-700 mb-1">單數行背景</label>
                        <div className="flex h-10 border border-gray-300 rounded-lg overflow-hidden">
                          <input type="color" value={styles.rowOddBg} onChange={(e) => handleStyleChange('rowOddBg', e.target.value)} className="w-12 h-full p-0 border-0 cursor-pointer" />
                          <input type="text" value={styles.rowOddBg} onChange={(e) => handleStyleChange('rowOddBg', e.target.value)} className="flex-1 px-2 text-sm uppercase outline-none" />
                        </div>
                      </div>
                      <div>
                        <label className="block text-xs font-medium text-gray-700 mb-1">雙數行背景</label>
                        <div className="flex h-10 border border-gray-300 rounded-lg overflow-hidden">
                          <input type="color" value={styles.rowEvenBg} onChange={(e) => handleStyleChange('rowEvenBg', e.target.value)} className="w-12 h-full p-0 border-0 cursor-pointer" />
                          <input type="text" value={styles.rowEvenBg} onChange={(e) => handleStyleChange('rowEvenBg', e.target.value)} className="flex-1 px-2 text-sm uppercase outline-none" />
                        </div>
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block text-xs font-medium text-gray-700 mb-1">表格內容文字色</label>
                        <div className="flex h-10 border border-gray-300 rounded-lg overflow-hidden">
                          <input type="color" value={styles.bodyText} onChange={(e) => handleStyleChange('bodyText', e.target.value)} className="w-12 h-full p-0 border-0 cursor-pointer" />
                          <input type="text" value={styles.bodyText} onChange={(e) => handleStyleChange('bodyText', e.target.value)} className="flex-1 px-2 text-sm uppercase outline-none" />
                        </div>
                      </div>
                      <div>
                        <label className="block text-xs font-medium text-gray-700 mb-1">邊框顏色</label>
                        <div className="flex h-10 border border-gray-300 rounded-lg overflow-hidden">
                          <input type="color" value={styles.borderColor} onChange={(e) => handleStyleChange('borderColor', e.target.value)} className="w-12 h-full p-0 border-0 cursor-pointer" />
                          <input type="text" value={styles.borderColor} onChange={(e) => handleStyleChange('borderColor', e.target.value)} className="flex-1 px-2 text-sm uppercase outline-none" />
                        </div>
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block text-xs font-medium text-gray-700 mb-1">重點背景 (Highlight)</label>
                        <div className="flex h-10 border border-gray-300 rounded-lg overflow-hidden">
                          <input type="color" value={styles.highlightBg} onChange={(e) => handleStyleChange('highlightBg', e.target.value)} className="w-12 h-full p-0 border-0 cursor-pointer" />
                          <input type="text" value={styles.highlightBg} onChange={(e) => handleStyleChange('highlightBg', e.target.value)} className="flex-1 px-2 text-sm uppercase outline-none" />
                        </div>
                      </div>
                      <div>
                        <label className="block text-xs font-medium text-gray-700 mb-1">重點文字 (Highlight)</label>
                        <div className="flex h-10 border border-gray-300 rounded-lg overflow-hidden">
                          <input type="color" value={styles.highlightText} onChange={(e) => handleStyleChange('highlightText', e.target.value)} className="w-12 h-full p-0 border-0 cursor-pointer" />
                          <input type="text" value={styles.highlightText} onChange={(e) => handleStyleChange('highlightText', e.target.value)} className="flex-1 px-2 text-sm uppercase outline-none" />
                        </div>
                      </div>
                    </div>

                    <div>
                       <label className="block text-xs font-medium text-gray-700 mb-1">內容對齊方式</label>
                       <select 
                        className="w-full h-10 px-3 border border-gray-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-green-500"
                        value={styles.textAlign}
                        onChange={(e) => handleStyleChange('textAlign', e.target.value)}
                       >
                         <option value="center">置中對齊</option>
                         <option value="left">靠左對齊</option>
                       </select>
                    </div>
                  </div>
                </div>
              </div>

              {/* 右側：輸出區 */}
              <div className="lg:col-span-8 space-y-6">
                <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                   <div className="flex justify-between items-center mb-4">
                    <h2 className="text-lg font-semibold flex items-center gap-2">
                      <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" className="text-gray-500"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><path d="M3 9h18"></path></svg>
                      即時預覽
                    </h2>
                   </div>
                   <div 
                     className="p-4 bg-white border border-dashed border-gray-300 rounded-lg max-w-full"
                     dangerouslySetInnerHTML={{ __html: generatedCode }}
                   />
                </div>

                <div className="bg-gray-900 rounded-xl shadow-sm border border-gray-800 overflow-hidden flex flex-col">
                  <div className="bg-gray-800 px-4 py-3 flex justify-between items-center">
                    <h2 className="text-sm font-semibold text-gray-200 flex items-center gap-2">
                      3. 複製並貼上到 Divi「文字模組」的「文字 (Text)」頁籤
                    </h2>
                    <button
                      onClick={copyToClipboard}
                      className={`flex items-center gap-1.5 px-4 py-1.5 rounded-md text-sm font-medium transition-colors ${
                        copied ? 'bg-green-500 text-white' : 'bg-green-600 hover:bg-green-500 text-white'
                      }`}
                    >
                      {copied ? 
                        <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="20 6 9 17 4 12"></polyline></svg> 
                        : 
                        <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                      }
                      {copied ? '已複製防彈代碼！' : '一鍵複製代碼'}
                    </button>
                  </div>
                  <div className="p-4 overflow-auto max-h-64 bg-gray-900">
                    <pre className="text-gray-300 text-xs font-mono whitespace-pre-wrap break-all">
                      {generatedCode}
                    </pre>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<InlineTableGenerator />);
  </script>
</body>
</html>
