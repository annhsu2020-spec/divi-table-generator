<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Divi 文字模組專用防彈表格生成器</title>
  
  <!-- 僅載入 Tailwind CSS (確保美觀，且此 CDN 極為穩定) -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen p-6">

  <div class="max-w-7xl mx-auto space-y-6">
    
    <!-- Header -->
    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex items-center justify-between border-l-4 border-l-green-500">
      <div>
        <h1 class="text-2xl font-bold text-gray-900 flex items-center gap-2">
          <!-- SVG 圖示 (無須載入第三方圖示庫，確保 0 延遲且不卡關) -->
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" class="text-green-600" viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"></polyline><line x1="9" y1="20" x2="15" y2="20"></line><line x1="12" y1="4" x2="12" y2="20"></line></svg>
          Divi 「文字模組」專用防彈表格生成器 (GitHub Pages 穩定版)
        </h1>
        <p class="text-gray-500 mt-1 text-sm">
          免安裝、免指令！貼上您的原始 HTML 表格，自訂顏色後複製「防彈內聯樣式代碼」，直接貼入 Divi 文字模組即可。
        </p>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
      
      <!-- 左側：設定區 -->
      <div class="lg:col-span-4 space-y-6">
        
        <!-- 1. 原始碼輸入 -->
        <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
          <h2 class="text-lg font-semibold mb-3 flex items-center gap-2">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" class="text-gray-500" viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
            1. 貼上原始 Table 語法
          </h2>
          <textarea
            id="inputHtml"
            class="w-full h-48 p-3 text-sm font-mono border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none"
            placeholder="在此貼上您的 <table>...</table>"
          ></textarea>
        </div>

        <!-- 2. 顏色與樣式設定 -->
        <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
          <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" class="text-gray-500" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path><path d="M2 12h20"></path></svg>
            2. 快速樣式調校
          </h2>
          
          <div class="space-y-4">
            <!-- 抬頭背景色與文字色 -->
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">抬頭背景色</label>
                <div class="flex h-10 border border-gray-300 rounded-lg overflow-hidden">
                  <input type="color" id="headerBgPicker" value="#4a658a" class="w-12 h-full p-0 border-0 cursor-pointer" />
                  <input type="text" id="headerBgText" value="#4a658a" class="flex-1 px-2 text-sm uppercase outline-none" />
                </div>
              </div>
              <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">抬頭文字色</label>
                <div class="flex h-10 border border-gray-300 rounded-lg overflow-hidden">
                  <input type="color" id="headerTextPicker" value="#ffffff" class="w-12 h-full p-0 border-0 cursor-pointer" />
                  <input type="text" id="headerTextText" value="#ffffff" class="flex-1 px-2 text-sm uppercase outline-none" />
                </div>
              </div>
            </div>

            <!-- 單雙行背景色 -->
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">單數行背景</label>
                <div class="flex h-10 border border-gray-300 rounded-lg overflow-hidden">
                  <input type="color" id="rowOddBgPicker" value="#ffffff" class="w-12 h-full p-0 border-0 cursor-pointer" />
                  <input type="text" id="rowOddBgText" value="#ffffff" class="flex-1 px-2 text-sm uppercase outline-none" />
                </div>
              </div>
              <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">雙數行背景</label>
                <div class="flex h-10 border border-gray-300 rounded-lg overflow-hidden">
                  <input type="color" id="rowEvenBgPicker" value="#eef4fa" class="w-12 h-full p-0 border-0 cursor-pointer" />
                  <input type="text" id="rowEvenBgText" value="#eef4fa" class="flex-1 px-2 text-sm uppercase outline-none" />
                </div>
              </div>
            </div>

            <!-- 表格文字色與邊框色 -->
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">表格內容文字色</label>
                <div class="flex h-10 border border-gray-300 rounded-lg overflow-hidden">
                  <input type="color" id="bodyTextPicker" value="#333333" class="w-12 h-full p-0 border-0 cursor-pointer" />
                  <input type="text" id="bodyTextText" value="#333333" class="flex-1 px-2 text-sm uppercase outline-none" />
                </div>
              </div>
              <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">邊框顏色</label>
                <div class="flex h-10 border border-gray-300 rounded-lg overflow-hidden">
                  <input type="color" id="borderColorPicker" value="#4a658a" class="w-12 h-full p-0 border-0 cursor-pointer" />
                  <input type="text" id="borderColorText" value="#4a658a" class="flex-1 px-2 text-sm uppercase outline-none" />
                </div>
              </div>
            </div>

    
            <!-- 對齊方式與字型大小 -->
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">內容對齊方式</label>
                <select id="textAlign" class="w-full h-10 px-2 border border-gray-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-green-500">
                  <option value="center" selected>置中對齊</option>
                  <option value="left">靠左對齊</option>
                </select>
              </div>
              <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">字體大小</label>
                <select id="fontSize" class="w-full h-10 px-2 border border-gray-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-green-500">
                  <option value="14px">14px</option>
                  <option value="15px" selected>15px</option>
                  <option value="16px">16px</option>
                  <option value="18px">18px</option>
                </select>
              </div>
            </div>

          </div>
        </div>
      </div>

      <!-- 右側：預覽與代碼輸出區 -->
      <div class="lg:col-span-8 space-y-6">
        
        <!-- 預覽 -->
        <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
          <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" class="text-gray-500" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><path d="M3 9h18"></path></svg>
            即時預覽
          </h2>
          <div id="previewContainer" class="p-4 bg-white border border-dashed border-gray-300 rounded-lg overflow-x-auto">
            <!-- 預覽表格將會渲染在此 -->
          </div>
        </div>

        <!-- 輸出代碼 -->
        <div class="bg-gray-900 rounded-xl shadow-sm border border-gray-800 overflow-hidden flex flex-col">
          <div class="bg-gray-800 px-4 py-3 flex justify-between items-center">
            <h2 class="text-sm font-semibold text-gray-200 flex items-center gap-2">
              3. 複製並貼上到 Divi「文字模組」的「文字 (Text)」頁籤
            </h2>
            <button
              id="copyBtn"
              class="flex items-center gap-1.5 px-4 py-1.5 rounded-md text-sm font-medium bg-green-600 hover:bg-green-500 text-white transition-colors"
            >
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
              <span id="copyBtnText">一鍵複製防彈代碼</span>
            </button>
          </div>
          <div class="p-4 overflow-auto max-h-64 bg-gray-900">
            <pre id="outputCode" class="text-gray-300 text-xs font-mono whitespace-pre-wrap break-all"></pre>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    // 預設 HTML 代碼
    const defaultHtml = `<table class="compare-table">
<thead>
<tr>
<th>項目</th>
<th>項目</th>
<th>項目</th>
</tr>
</thead>
<tbody>
<tr>
<td>13:30-14:00</td>
<td>內容標題</td>
<td>-</td>
</tr>
<tr>
<td>14:00-14:15</td>
<td>內容標題</td>
<td>內容標題</td>
</tr>
<tr>
<td>14:15-15:00</td>
<td>內容標題</td>
<td>內容標題</td>
</tr>
<tr>
<td>15:00-15:20</td>
<td>內容標題</td>
<td>-</td>
</tr>
<tr>
<td>15:40-16:40</td>
<td>內容標題</td>
<td>內容標題</td>
</tr>
</tbody>
</table>`;

    // 初始化輸入框的值
    document.getElementById('inputHtml').value = defaultHtml;

    // 雙向綁定色彩選擇器與文字框
    const colorBinds = [
      { picker: 'headerBgPicker', text: 'headerBgText' },
      { picker: 'headerTextPicker', text: 'headerTextText' },
      { picker: 'rowOddBgPicker', text: 'rowOddBgText' },
      { picker: 'rowEvenBgPicker', text: 'rowEvenBgText' },
      { picker: 'bodyTextPicker', text: 'bodyTextText' },
      { picker: 'borderColorPicker', text: 'borderColorText' },
      { picker: 'highlightBgPicker', text: 'highlightBgText' },
      { picker: 'highlightTextPicker', text: 'highlightTextText' }
    ];

    colorBinds.forEach(bind => {
      const pEl = document.getElementById(bind.picker);
      const tEl = document.getElementById(bind.text);

      pEl.addEventListener('input', (e) => {
        tEl.value = e.target.value.toUpperCase();
        generateTable();
      });

      tEl.addEventListener('input', (e) => {
        let val = e.target.value;
        if (val.startsWith('#') && val.length === 7) {
          pEl.value = val;
          generateTable();
        }
      });
    });

    // 綁定其餘表單更新事件
    document.getElementById('inputHtml').addEventListener('input', generateTable);
    document.getElementById('textAlign').addEventListener('change', generateTable);
    document.getElementById('fontSize').addEventListener('change', generateTable);

    // 生成表格核心邏輯
    function generateTable() {
      const inputHtml = document.getElementById('inputHtml').value.trim();
      const headerBg = document.getElementById('headerBgText').value;
      const headerText = document.getElementById('headerTextText').value;
      const rowOddBg = document.getElementById('rowOddBgText').value;
      const rowEvenBg = document.getElementById('rowEvenBgText').value;
      const bodyText = document.getElementById('bodyTextText').value;
      const borderColor = document.getElementById('borderColorText').value;
      const highlightBg = document.getElementById('highlightBgText').value;
      const highlightText = document.getElementById('highlightTextText').value;
      const textAlign = document.getElementById('textAlign').value;
      const fontSize = document.getElementById('fontSize').value;

      if (!inputHtml) {
        document.getElementById('previewContainer').innerHTML = '<p class="text-gray-400 text-center">等待輸入 HTML 語法...</p>';
        document.getElementById('outputCode').textContent = '';
        return;
      }

      try {
        const parser = new DOMParser();
        const doc = parser.parseFromString(inputHtml, 'text/html');
        const table = doc.querySelector('table');

        if (!table) {
          document.getElementById('previewContainer').innerHTML = '<p class="text-red-500 text-center">找不到 &lt;table&gt; 標籤，請確認格式是否正確</p>';
          document.getElementById('outputCode').textContent = '';
          return;
        }

        // 1. 設定 Table 基礎 CSS
        table.removeAttribute('class');
        table.style.cssText = `width: 100%; min-width: 600px; border-collapse: collapse; font-family: inherit; font-size: ${fontSize}; line-height: 1.6;`;

        // 2. 設定 Th 抬頭
        const ths = table.querySelectorAll('th');
        ths.forEach(th => {
          th.style.cssText = `background-color: ${headerBg}; color: ${headerText}; padding: 16px 12px; border: 1px solid ${borderColor}; text-align: center; font-weight: bold; white-space: nowrap;`;
        });

        // 3. 設定 Td 與 斑馬紋、重點行/格高亮
        const trs = table.querySelectorAll('tbody tr');
        trs.forEach((tr, index) => {
          const isHighlightRow = tr.classList.contains('highlight-cell');
          const defaultBg = index % 2 === 0 ? rowOddBg : rowEvenBg;

          const tds = tr.querySelectorAll('td');
          tds.forEach(td => {
            const isHighlightCell = td.classList.contains('highlight-cell') || isHighlightRow;
            const bg = isHighlightCell ? highlightBg : defaultBg;
            const textColor = isHighlightCell ? highlightText : bodyText;

            td.style.cssText = `padding: 14px 12px; border: 1px solid ${borderColor}; text-align: ${textAlign}; vertical-align: middle; background-color: ${bg}; color: ${textColor};`;
            td.removeAttribute('class');
          });
          tr.removeAttribute('class');
        });

        // 4. 外層 RWD 包覆
        const finalHtml = `
<div style="width: 100%; overflow-x: auto; margin-bottom: 20px; box-shadow: 0 0 0 1px ${borderColor} inset; border-radius: 4px;">
  ${table.outerHTML.trim()}
</div>
        `.trim();

        // 5. 更新預覽與輸出代碼
        document.getElementById('previewContainer').innerHTML = finalHtml;
        document.getElementById('outputCode').textContent = finalHtml;

      } catch (error) {
        document.getElementById('previewContainer').innerHTML = '<p class="text-red-500 text-center">解析錯誤，請確認貼上的 HTML 語法</p>';
        document.getElementById('outputCode').textContent = '';
      }
    }

    // 複製剪貼簿功能
    document.getElementById('copyBtn').addEventListener('click', () => {
      const code = document.getElementById('outputCode').textContent;
      if (!code) return;

      const textArea = document.createElement("textarea");
      textArea.value = code;
      document.body.appendChild(textArea);
      textArea.select();
      
      try {
        document.execCommand('copy');
        const btnText = document.getElementById('copyBtnText');
        const btn = document.getElementById('copyBtn');
        
        btnText.textContent = '已複製防彈代碼！';
        btn.classList.replace('bg-green-600', 'bg-blue-600');
        btn.classList.replace('hover:bg-green-500', 'hover:bg-blue-500');

        setTimeout(() => {
          btnText.textContent = '一鍵複製防彈代碼';
          btn.classList.replace('bg-blue-600', 'bg-green-600');
          btn.classList.replace('hover:bg-blue-500', 'hover:bg-green-500');
        }, 2000);
      } catch (err) {
        console.error('複製失敗：', err);
      }
      document.body.removeChild(textArea);
    });

    // 首次執行初始化
    generateTable();
  </script>
</body>
</html>
